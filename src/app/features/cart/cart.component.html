<div>
<div class="flex align-items-center mb-3">
  <p-button
    icon="pi pi-arrow-left"
    label="Continue Shopping"
    [raised]="true"
    [rounded]="true"
    styleClass="premium-back-btn"
    (onClick)="goBack()">
</p-button>
</div>
<h2>My Cart</h2>

<div *ngIf="cartItems.length === 0" class="empty-cart">
    Your cart is empty. 
</div>
<div *ngFor="let item of cartItems" class="cart-card">
    <button pButton type="button" icon="pi pi-trash" class="p-button-sm remove-btn" (click)="removeItem(item)"></button>    
    <img [src]="item.imageUrl"appFallbackImage alt="Part image" class="part-image"/>    
    <div class="cart-details">
        <h3>{{ item.partName }}</h3>
        <p>Price: ₹ {{ item.price }}</p>
        <div class="qty-controls">
        <button pButton type="button" icon="pi pi-minus" class="p-button-sm"(click)="updateQuantity(item,- 1)"></button>
        <span class="qty-value">Quantity: {{ item.quantity }}</span>
        <button pButton type="button"icon="pi pi-plus" class="p-button-sm" (click)="updateQuantity(item,+ 1)"></button>    
    </div>
        <p>Subtotal: ₹ {{ item.subTotal  }}</p>
    </div>
</div>
<div class="cart-total" *ngIf="cartItems.length>0">
    <h3>Grand Total: ₹ {{ total }}</h3>
</div>
<div>
    <button class="btn-checkout" *ngIf="cartItems.length>0" (click)="proceedToCheckout()">Proceed to Checkout</button>
</div>
</div>
