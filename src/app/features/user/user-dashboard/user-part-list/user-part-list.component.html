<p>user-part-list works!</p>

<div class="parts-grid">
    <div class="part-card" *ngFor="let part of parts">
        <img [src]="part.imageUrl" alt="part image"/>
        <h3>{{part.name}}</h3>
        <p>{{part.description}}</p>
        <span class="price">₹ {{part.price}}</span>
    </div>
</div>
