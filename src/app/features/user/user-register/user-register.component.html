<div class="card p-4 container-sm">
    <!--Header-->
    <div class="d-flex align-items-center mb-3">
        <button mat-icon-button (click)="goBack()">
            <mat-icon>arrow_back</mat-icon>
        </button>
        <h2 class="mb-0 ms-2">User Registration</h2>
    </div>
    <!--body-->

    <form [formGroup]="userRegisterForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
            <label for="name">Name</label>
            <input pInputText formControlName="name" class="w-100">
            <p-message *ngIf="userRegisterForm.get('name')?.touched &&
            userRegisterForm.get('name')?.invalid" severity="error" text="Enter a valid name" class="mt-2"></p-message>
        </div>

        <div class="mb-3">
            <label for="phone">Phone</label><br>
            <input pInputText formControlName="phone" class="w-100">
            <p-message *ngIf="userRegisterForm.get('phone')?.touched &&
             userRegisterForm.get('phone')?.invalid" severity="error" text="Enter a valid phone number"></p-message>
        </div>

        <div class="mb-3">
            <label for="">Email</label><br>
            <input pInputText formControlName="email" class="w-100">
            <p-message *ngIf="userRegisterForm.get('email')?.touched &&
            userRegisterForm.get('email')?.invalid" severity="error" text="Enter a valid email"></p-message>
        </div>
        <div class="mb-3">
            <label for="password">Password</label><br>
            <p-password formControlName="password" toggleMask [inputStyle]="{width:'100%'}"
                styleClass="w-100"></p-password>
        </div>
        <div class="mb-3">
            <label for="confirmPassword">Confirm Password</label> <br>
            <p-password formControlName="confirmPassword" toggleMask [inputStyle]="{width:'100%'}"
                styleClass="w-100"></p-password>
            <p-message *ngIf="userRegisterForm.get('confirmPassword')?.errors?.['mismatch']" severity="error"
                text="Password do not match"></p-message>
        </div>
        <div class="d-flex justify-content-center mt-3">
            <button pButton type="submit" label="Register" class="w-100 mt-3  p-button-primary">
            </button>
        </div>

    </form>
</div>
