<button mat-icon-button (click)="goBack()">
  <mat-icon>arrow_back</mat-icon>
</button>
<div class="card p-4 max-w-xl mx-auto">
    <h2 calss="text-xl font-semibold mb-3">User Registration</h2>
    <form [formGroup]="userRegisterForm" (ngSubmit)="onSubmit()">

        <div class="mb-3">
            <label for="">Name</label><br>
            <input pInputText formControlName="name" class="w-full">
            <p-message *ngIf="userRegisterForm.get('name')?.touched &&
            userRegisterForm.get('name')?.invalid" severity="error" text="Enter a valid name"  class="mt-2"></p-message>
        </div>

        <div class="mb-3">
            <label for="phone">Phone</label><br>
            <input pInputText formControlName="phone" class="w-full">
            <p-message *ngIf="userRegisterForm.get('phone')?.touched &&
             userRegisterForm.get('phone')?.invalid" severity="error" text="Enter a valid phone number"></p-message>
        </div>

        <div class="mb-3">
            <label for="">Email</label><br>
            <input pInputText formControlName="email" class="w-full">
            <p-message *ngIf="userRegisterForm.get('email')?.touched &&
            userRegisterForm.get('email')?.invalid" severity="error" text="Enter a valid email"></p-message>
        </div>
            <div class="mb-3">
                <label for="password">Password</label><br>
                <p-password formControlName="password" toggleMask></p-password>
            </div>
        <div class="mb-3">
            <label for="confirmPassword">Confirm Password</label> <br>
            <p-password formControlName="confirmPassword" toggleMask></p-password>
            <p-message *ngIf="userRegisterForm.get('confirmPassword')?.errors?.['mismatch']"
            severity="error" text="Password do not match"></p-message>
      </div>
    <button pButton type="submit" label="Register" class="w-full mt-5  p-button-primary">
    </button>
  </form>
</div>
